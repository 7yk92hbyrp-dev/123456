<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Workout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THE THEME PASSPORT  ·  Vitality
   Near-black, but alive — a soft green editorial glow, faint grain.
   Instrument Serif for display (italic = personality).
   Inter for the numbers (the hero of every row).
   Mono only for tiny UPPERCASE meta.
   Two earned accents: mint = "yes" (fills, flips text to ink),
   amber = "notable". Never decorate with either.
   Big rounded cards, round pills, hairline borders, lots of air.
   Feel: a premium, editorial Apple Health app. Calm. One thing at a time.
   ============================================================ */
:root{
  --bg:#000;
  --fg:#fff;

  --mint:#6EE7B7;         /* winning · live · primary        */
  --mint-soft:#A7F3D0;    /* the fill on a won row           */
  --mint-ink:#042a1c;     /* text/icons sitting on a mint fill */
  --mint-deep:#1f4d3d;

  --amber:#F59E0B;        /* personal records · needs a look */

  --muted:rgba(255,255,255,0.5);
  --muted-strong:rgba(255,255,255,0.70);
  --faint:rgba(255,255,255,0.30);
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(255,255,255,0.16);
  --card:rgba(255,255,255,0.02);

  --radius-card:18px;
  --radius-pill:999px;

  --serif:'Instrument Serif',Georgia,'Times New Roman',serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;

  --ease:cubic-bezier(0.16,1,0.3,1);   /* the signature easing */
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--fg);
  font-family:var(--sans);
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  min-height:100dvh;
  overflow-x:hidden;
}
::selection{background:rgba(110,231,183,0.25);color:#fff}

/* ---- Editorial atmosphere: green glow + vignette + faint drifting grid ---- */
.atmos{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 45% at 50% 6%, rgba(110,231,183,0.11), rgba(110,231,183,0.03) 46%, transparent 72%),
    radial-gradient(ellipse 120% 80% at 50% 100%, rgba(14,38,30,0.45), rgba(0,0,0,0.96));
}
.atmos::before{content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(110,231,183,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(110,231,183,0.05) 1px,transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(ellipse 85% 55% at 50% 14%,#000,transparent 72%);
          mask-image:radial-gradient(ellipse 85% 55% at 50% 14%,#000,transparent 72%);
  opacity:.5;animation:drift 60s linear infinite;
}
@keyframes drift{to{background-position:46px 46px}}
/* very subtle film grain */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size:200px 200px;}

/* ---- App column: mobile-first, centered on larger screens ---- */
.app{
  position:relative;z-index:5;
  max-width:460px;margin:0 auto;min-height:100dvh;
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 12px) 22px calc(env(safe-area-inset-bottom) + 30px);
}

/* ---- Title bar ---- */
.titlebar{position:sticky;top:0;z-index:10;padding:16px 2px 20px;
  background:linear-gradient(to bottom, #000 62%, transparent);}
.eyebrow{font-family:var(--mono);font-size:.64rem;font-weight:500;
  letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.title{margin-top:9px;font-family:var(--serif);font-weight:400;
  font-size:2.7rem;line-height:.96;letter-spacing:-.01em;}

/* ---- Today area ---- */
.today{flex:1;display:flex;flex-direction:column;padding-top:6px;}

/* Calm empty state. No mint here — mint is earned, not decoration. */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:18px;padding:44px 26px 68px;
  border:1px solid var(--line);border-radius:var(--radius-card);background:var(--card);
  animation:rise .8s var(--ease) both;}
.empty svg{width:34px;height:34px;color:var(--faint);stroke-width:1.5}
.empty .h{font-family:var(--serif);font-style:italic;font-size:1.5rem;line-height:1.1;color:var(--fg);}
.empty .s{max-width:26ch;font-size:.92rem;line-height:1.5;color:var(--muted);}

@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <div class="atmos"></div>
  <div class="grain"></div>

  <div class="app">

    <header class="titlebar">
      <div class="eyebrow" id="eyebrow">Today</div>
      <h1 class="title">Today</h1>
    </header>

    <main class="today" id="today">
      <!-- Empty for now. This is where the workout will live. -->
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.5 6.5l11 11"/>
          <rect x="2.5" y="8" width="4" height="8" rx="1.2"/>
          <rect x="17.5" y="8" width="4" height="8" rx="1.2"/>
          <path d="M1 12h1.5M21.5 12H23"/>
        </svg>
        <div class="h">Nothing logged yet</div>
        <div class="s">Your workout for today will show up here.</div>
      </div>
    </main>

  </div>

<script>
/* ------------------------------------------------------------------
   Everything lives in the browser — no build step, no server.
   Saved to localStorage so it's still here on reload.
   (Store scaffolded now; we fill it one prompt at a time.)
   ------------------------------------------------------------------ */
const STORE_KEY = 'workout.v1';
function load(){ try { return JSON.parse(localStorage.getItem(STORE_KEY)) || null; } catch (e) { return null; } }
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

let state = load() || {
  exercises: [],   // logged lifts / library
  sessions:  [],   // finished days
};

/* Live date in the eyebrow. */
(function setDate(){
  const now = new Date();
  document.getElementById('eyebrow').textContent =
    now.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' }).toUpperCase();
})();
</script>
</body>
</html>
