<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Workout</title>
  <style>
    /* ---- Theme tokens ---------------------------------------------------- */
    :root {
      --bg: #000000;
      --mint: #6EE7B7;
      --mint-soft: rgba(110, 231, 183, 0.10);
      --amber: #FBBF24;
      --amber-soft: rgba(251, 191, 36, 0.10);
      --text: #FFFFFF;
      --muted: rgba(255, 255, 255, 0.5);
      --faint: rgba(255, 255, 255, 0.3);
      --hairline: rgba(255, 255, 255, 0.08);
      --card: rgba(255, 255, 255, 0.03);
      --radius: 18px;
      --pad: 20px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
    }

    body {
      font-family: inherit;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: none;
    }

    button {
      font-family: inherit;
      color: inherit;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    button:active { opacity: 0.7; }

    input {
      font-family: inherit;
      color: var(--text);
      background: none;
      border: none;
      outline: none;
    }

    /* ---- App frame ------------------------------------------------------- */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), 8px) var(--pad)
               calc(max(env(safe-area-inset-bottom), 12px) + 86px);
      display: flex;
      flex-direction: column;
    }
    .app.no-tabs { padding-bottom: max(env(safe-area-inset-bottom), 28px); }

    main { flex: 1; display: flex; flex-direction: column; }

    /* ---- Title bars ------------------------------------------------------ */
    .titlebar { padding: 24px 4px 20px; }

    .titlebar .eyebrow {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--muted);
      margin: 0 0 4px;
    }

    .titlebar h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .backbtn {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      min-height: 44px;
      padding: 0 4px;
      margin: 8px 0 0 -4px;
      font-size: 15px;
      font-weight: 500;
      color: var(--muted);
    }
    .backbtn svg { display: block; }

    /* ---- Tab bar ---------------------------------------------------------- */
    .tabbar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 5;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--hairline);
    }
    .tabbar .inner {
      max-width: 480px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding-bottom: max(env(safe-area-inset-bottom), 8px);
    }
    .tabbar button {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 0 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--faint);
      min-height: 58px;
    }
    .tabbar button.on { color: var(--text); }
    .tabbar svg { display: block; }

    /* ---- Cards ------------------------------------------------------------ */
    .card {
      background: var(--card);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      margin: 0 0 14px;
    }

    /* ---- Lifts list -------------------------------------------------------- */
    .ex-row {
      display: flex;
      align-items: center;
      width: 100%;
      text-align: left;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      min-height: 76px;
    }
    .ex-row .ex-name { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .ex-row .ex-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .ex-row .ex-main { flex: 1; min-width: 0; }
    .ex-row .ex-best { text-align: right; flex-shrink: 0; }
    .ex-row .ex-best .num {
      font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }
    .ex-row .ex-best .lbl {
      font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--faint); margin-top: 2px;
    }
    .ex-row .chev { color: var(--faint); flex-shrink: 0; }

    /* ---- Buttons ----------------------------------------------------------- */
    .btn-primary {
      display: block;
      width: 100%;
      min-height: 56px;
      border-radius: 16px;
      background: var(--mint);
      color: #000;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .btn-outline {
      display: block;
      width: 100%;
      min-height: 56px;
      border-radius: 16px;
      border: 1px solid var(--hairline);
      color: var(--muted);
      font-size: 16px;
      font-weight: 600;
    }

    .btn-quiet {
      display: block;
      width: 100%;
      min-height: 48px;
      font-size: 14px;
      font-weight: 500;
      color: var(--faint);
      margin-top: 8px;
    }

    /* ---- Session (Today) cards ---------------------------------------------- */
    .sess-card { padding: 6px 18px; }

    .sess-head {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      text-align: left;
      padding: 14px 0;
      min-height: 64px;
    }
    .sess-head .t { flex: 1; min-width: 0; }
    .sess-head .nm { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .sess-head .sb { font-size: 13px; color: var(--muted); margin-top: 3px; font-variant-numeric: tabular-nums; }
    .icon-btn {
      width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--faint);
      flex-shrink: 0;
      margin-right: -10px;
    }

    .sess-sets { padding-bottom: 6px; }
    .sess-logger { padding: 4px 0 16px; }

    /* ---- Set rows & badges ----------------------------------------------------- */
    .set-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 4px 12px;
      margin: 2px -12px;
      border-radius: 12px;
    }
    .set-row .set-num {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }
    .set-row .set-sp { flex: 1; }
    .set-row .set-time {
      font-size: 12px;
      color: var(--faint);
      font-variant-numeric: tabular-nums;
    }
    .set-row .set-del {
      width: 44px;
      min-height: 44px;
      margin-right: -14px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.22);
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      border-radius: 999px;
      padding: 4px 9px;
      flex-shrink: 0;
    }
    .badge.pr    { color: var(--amber); border: 1px solid rgba(251, 191, 36, 0.4); }
    .badge.beat  { color: var(--mint);  border: 1px solid rgba(110, 231, 183, 0.4); }
    .badge.quiet { color: var(--faint); border: 1px solid var(--hairline); }

    .set-row.g-pr   { background: var(--amber-soft); }
    .set-row.g-pr .set-num   { color: var(--amber); }
    .set-row.g-beat { background: var(--mint-soft); }
    .set-row.g-beat .set-num { color: var(--mint); }

    @keyframes flashMint  { 0% { transform: scale(0.97); background: rgba(110, 231, 183, 0.30); } 100% { transform: scale(1); background: var(--mint-soft); } }
    @keyframes flashAmber { 0% { transform: scale(0.97); background: rgba(251, 191, 36, 0.30); } 100% { transform: scale(1); background: var(--amber-soft); } }
    @keyframes flashPlain { 0% { transform: scale(0.98); background: rgba(255, 255, 255, 0.08); } 100% { transform: scale(1); background: transparent; } }
    .set-row.fl-beat  { animation: flashMint  0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .set-row.fl-pr    { animation: flashAmber 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .set-row.fl-quiet { animation: flashPlain 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }

    /* ---- Logger fields ------------------------------------------------------------ */
    .chip {
      display: inline-flex;
      align-items: baseline;
      gap: 7px;
      border: 1px solid var(--hairline);
      border-radius: 999px;
      padding: 8px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .chip b {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .field { margin-bottom: 14px; }
    .field-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .field-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .seg {
      display: inline-flex;
      border: 1px solid var(--hairline);
      border-radius: 10px;
      overflow: hidden;
    }
    .seg button {
      min-width: 44px;
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--faint);
    }
    .seg button.on { background: rgba(255, 255, 255, 0.08); color: var(--text); }

    .stepper { display: flex; align-items: stretch; gap: 10px; }
    .stepper .stp {
      width: 56px;
      min-height: 54px;
      flex-shrink: 0;
      border: 1px solid var(--hairline);
      border-radius: 14px;
      font-size: 26px;
      font-weight: 500;
      color: var(--muted);
      line-height: 1;
    }
    .stepper input {
      flex: 1;
      min-width: 0;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
      border: 1px solid var(--hairline);
      border-radius: 14px;
      min-height: 54px;
    }

    /* ---- Progress / chart ---------------------------------------------------- */
    .readout { margin-bottom: 6px; }
    .readout .ro-num {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--mint);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .readout .ro-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .chart-wrap {
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      margin: 4px -4px 6px;
    }
    .chart-wrap svg { display: block; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
      padding-top: 16px;
      border-top: 1px solid var(--hairline);
    }
    .stat .lbl {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 4px;
    }
    .stat .num {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }
    .stat .num.win { color: var(--mint); }
    .stat .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ---- History ---------------------------------------------------------------- */
    .day-head {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      margin: 18px 0 4px;
    }
    .day-head:first-child { margin-top: 0; }

    /* ---- Celebration -------------------------------------------------------------- */
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }
    .rise { animation: rise 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

    .cele-head { padding: 56px 4px 28px; }
    .cele-head .eyebrow {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 6px;
    }
    .cele-head h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1.05;
    }

    .cele-vol { padding: 0 4px 28px; }
    .cele-vol .num {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--mint);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .cele-vol .lbl { font-size: 14px; color: var(--muted); margin-top: 8px; }

    .cele-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 8px 0;
    }
    .cele-row + .cele-row { border-top: 1px solid var(--hairline); }
    .cele-row .nm { flex: 1; min-width: 0; font-size: 15px; font-weight: 600; }
    .cele-row .val {
      font-size: 17px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .cele-row .val .from {
      font-size: 13px;
      font-weight: 500;
      color: var(--faint);
      margin-right: 8px;
    }
    .cele-row .val.c-pr   { color: var(--amber); }
    .cele-row .val.c-beat { color: var(--mint); }
    .cele-row .sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 400; }

    /* ---- Empty state -------------------------------------------------------------- */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 8px;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty .empty-title { font-size: 17px; font-weight: 600; color: rgba(255, 255, 255, 0.7); }
    .empty .empty-sub { font-size: 14px; max-width: 26ch; line-height: 1.4; }

    .quiet-note {
      font-size: 13px;
      color: var(--faint);
      text-align: center;
      padding: 10px 0;
    }

    /* ---- Bottom sheet --------------------------------------------------------------- */
    .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); z-index: 10; }
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-width: 480px;
      margin: 0 auto;
      background: #000;
      border: 1px solid var(--hairline);
      border-bottom: none;
      border-radius: 24px 24px 0 0;
      padding: 24px var(--pad) max(env(safe-area-inset-bottom), 28px);
      z-index: 11;
      max-height: 80dvh;
      overflow-y: auto;
    }
    .sheet h2 { font-size: 21px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 18px; }
    .sheet .name-input {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--hairline);
      border-radius: 14px;
      padding: 0 16px;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .sheet .name-input::placeholder { color: var(--faint); font-weight: 400; }
    .sheet .lib-row {
      display: flex;
      align-items: center;
      width: 100%;
      text-align: left;
      gap: 12px;
      min-height: 56px;
      padding: 6px 2px;
      border-bottom: 1px solid var(--hairline);
    }
    .sheet .lib-row .nm { flex: 1; font-size: 16px; font-weight: 600; }
    .sheet .sect {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      margin: 18px 0 8px;
    }
    .sugg { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .sugg button {
      border: 1px solid var(--hairline);
      border-radius: 999px;
      padding: 0 16px;
      min-height: 42px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }

    /* ---- Exercise library ---------------------------------------------------------- */
    .sheet.lib { padding-top: 0; }
    .lib-head {
      position: sticky;
      top: 0;
      background: #000;
      padding: 22px 0 10px;
      margin-bottom: 2px;
      z-index: 3;
    }
    .lib-head h2 { margin: 0 0 12px; }
    .lib-searchwrap { position: relative; }
    .lib-search {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--hairline);
      border-radius: 14px;
      padding: 0 44px 0 16px;
      font-size: 16px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.03);
    }
    .lib-search::placeholder { color: var(--faint); font-weight: 400; }
    .lib-searchwrap svg {
      position: absolute;
      right: 15px; top: 50%;
      transform: translateY(-50%);
      color: var(--faint);
      pointer-events: none;
    }
    .lib-row .grp { display: block; font-size: 12px; color: var(--faint); margin-top: 3px; font-weight: 500; }
    .lib-row .go { color: var(--faint); flex-shrink: 0; }
    .lib-empty { color: var(--muted); font-size: 14px; padding: 18px 2px; line-height: 1.4; }
    .lib-create { margin-top: 14px; }

    /* ---- Exercise info (how-to + diagram) ------------------------------------------- */
    .info-back {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 40px;
      margin: -2px 0 4px -2px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }
    .info-title { font-size: 23px; font-weight: 800; letter-spacing: -0.02em; margin: 2px 0 3px; }
    .info-sub { font-size: 13px; font-weight: 600; color: var(--mint); margin-bottom: 8px; }
    .figs { display: flex; justify-content: center; gap: 26px; padding: 10px 0 16px; }
    .fig { display: flex; flex-direction: column; align-items: center; gap: 7px; }
    .fig svg { height: 150px; width: auto; display: block; }
    .fig .cap {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--faint);
    }
    .how { list-style: none; counter-reset: step; padding: 0; margin: 4px 0 22px; }
    .how li {
      counter-increment: step;
      display: flex;
      align-items: flex-start;
      gap: 13px;
      padding: 12px 0;
      border-top: 1px solid var(--hairline);
      font-size: 15px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.85);
    }
    .how li:first-child { border-top: none; }
    .how li::before {
      content: counter(step);
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(110, 231, 183, 0.4);
      color: var(--mint);
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .info-note { font-size: 14px; color: var(--muted); line-height: 1.4; padding: 6px 0 22px; }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <script>
  'use strict';

  /* ================= Data ================= */

  const KEY = 'workout.v1';
  const SUGGESTIONS = ['Bench Press', 'Squat', 'Deadlift', 'Overhead Press', 'Barbell Row', 'Pull-Up'];

  // Ordered muscle groups for the library.
  const GROUPS = ['Chest', 'Back', 'Legs', 'Shoulders', 'Arms', 'Core'];

  // Built-in exercise library: name, group, worked muscles (diagram keys), a one-line
  // muscle summary, and a 3-step how-to. Muscle keys map to regions in bodyDiagram().
  const CATALOG = [
    // ---- Chest ----
    { name: 'Bench Press', group: 'Chest', muscles: ['chest', 'triceps'], sub: 'Chest · Triceps',
      how: ['Lie flat and grip the bar just wider than your shoulders.', 'Lower it to your mid-chest with elbows tucked to about 45°.', 'Press up and slightly back until your arms lock out.'] },
    { name: 'Incline Bench Press', group: 'Chest', muscles: ['chest', 'delts'], sub: 'Upper Chest · Shoulders',
      how: ['Set the bench to about 30° and grip slightly wider than your shoulders.', 'Lower the bar to your upper chest.', 'Drive up until your arms are straight over your collarbone.'] },
    { name: 'Dumbbell Press', group: 'Chest', muscles: ['chest', 'triceps'], sub: 'Chest · Triceps',
      how: ['Lie back holding a dumbbell in each hand at chest level.', 'Press both up until they nearly touch overhead.', 'Lower under control until you feel a stretch.'] },
    { name: 'Push-Up', group: 'Chest', muscles: ['chest', 'triceps', 'abs'], sub: 'Chest · Core',
      how: ['Hands under your shoulders, body in one straight line.', 'Lower until your chest is just above the floor.', 'Push back up without letting your hips sag.'] },
    { name: 'Chest Fly', group: 'Chest', muscles: ['chest'], sub: 'Chest',
      how: ['Lie back holding a dumbbell in each hand above your chest.', 'Open your arms wide in an arc with a slight elbow bend.', 'Squeeze your chest to bring them back together.'] },
    { name: 'Dip', group: 'Chest', muscles: ['chest', 'triceps'], sub: 'Lower Chest · Triceps',
      how: ['Support yourself on parallel bars with arms straight.', 'Lean forward slightly and lower until your elbows reach ~90°.', 'Press back up to the top.'] },
    // ---- Back ----
    { name: 'Deadlift', group: 'Back', muscles: ['lowerback', 'glutes', 'hams', 'traps'], sub: 'Posterior Chain',
      how: ['Stand mid-foot under the bar, gripping just outside your shins.', 'Brace, keep a flat back, and drive the floor away.', 'Stand tall, then lower the bar along your legs.'] },

  // Persistence. Inside the Vitality dashboard this tile runs in a sandboxed frame
  // with NO localStorage, so it persists through the host bridge (window.Vitality,
  // injected by tileBridge). Opened standalone (no bridge present) it falls back to
  // localStorage, so the same file still works on its own.
  const STORE = (() => {
    const V = (typeof window !== 'undefined') ? window.Vitality : null;
    if (V && typeof V.save === 'function' && typeof V.load === 'function') {
      return { load: () => V.load(), save: (d) => { try { V.save(d); } catch (e) { /* ignore */ } } };
    }
    return {
      load: () => { try { return JSON.parse(localStorage.getItem(KEY)); } catch (e) { return null; } },
      save: (d) => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch (e) { /* ignore */ } },
    };
  })();

  // db is populated by boot() once the store resolves; start with a safe empty shape.
  let db = { exercises: [], unit: 'lb', sessions: [], today: null, view: { name: 'today' } };

  // Normalise whatever the store returns (the bridge hands back [] when empty).
  function normalize(d) {
    if (!d || Array.isArray(d) || !Array.isArray(d.exercises)) d = { exercises: [], unit: 'lb' };
    d.unit = d.unit || 'lb';
    d.sessions = Array.isArray(d.sessions) ? d.sessions : [];
    d.today = d.today || null;
    if (!d.view || d.view.name === 'home') d.view = { name: 'today' };
    return d;
  }

  function save() { STORE.save(db); }

  function uid() {
    return (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2));
  }

  function exById(id) { return db.exercises.find(e => e.id === id); }

  // Active session for today; discards a stale unfinished session from a past day.
  function todaySession() {
    const key = dayKey(Date.now());
    if (db.today && db.today.date !== key) { db.today = null; save(); }
    return db.today;
  }

  /* ================= Scoring & derived state ================= */

  // A set's strength score: estimated 1RM (Epley). Lets 100×8 fairly beat 105×1.
  function score(s) { return s.reps <= 1 ? s.weight : s.weight * (1 + s.reps / 30); }

  // Best set, optionally only counting sets strictly before a timestamp.
  function bestSet(ex, beforeTs) {
    let best = null;
    for (const s of ex.sets) {
      if (beforeTs !== undefined && s.ts >= beforeTs) continue;
      if (!best || score(s) > score(best)) best = s;
    }
    return best;
  }

  function dayKey(ts) {
    const d = new Date(ts);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // Sessions = sets grouped by calendar day, oldest first, each with its top set.
  function sessionsOf(ex) {
    const map = new Map();
    for (const s of ex.sets) {
      const k = dayKey(s.ts);
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(s);
    }
    return [...map.entries()]
      .map(([day, sets]) => ({
        day,
        sets: sets.sort((a, b) => a.ts - b.ts),
        top: sets.reduce((a, b) => (score(b) > score(a) ? b : a)),
      }))
      .sort((a, b) => (a.day < b.day ? -1 : 1));
  }

  // Top set of the most recent session strictly before `day`. Null if none.
  function lastTopBefore(ex, day) {
    const prev = sessionsOf(ex).filter(s => s.day < day);
    return prev.length ? prev[prev.length - 1].top : null;
  }

  // Consecutive sessions (ending at the latest) whose top set beat the session before.
  function streakOf(sessions) {
    let n = 0;
    for (let i = sessions.length - 1; i > 0; i--) {
      if (score(sessions[i].top) > score(sessions[i - 1].top)) n++;
      else break;
    }
    return n;
  }

  // Grade one set against history at the moment it was logged.
  //   pr    — beat the best set ever logged before it   (amber)
  //   beat  — beat last session's top set               (mint)
  //   first — nothing to compare against                (quiet)
  //   solid — logged, didn't beat last time             (quiet)
  function gradeSet(ex, s) {
    const prevBest = bestSet(ex, s.ts);
    if (!prevBest) return 'first';
    if (score(s) > score(prevBest)) return 'pr';
    const lastTop = lastTopBefore(ex, dayKey(s.ts));
    if (lastTop && score(s) > score(lastTop)) return 'beat';
    return 'solid';
  }

  const BADGE = {
    pr:    '<span class="badge pr">PR</span>',
    beat:  '<span class="badge beat">BEAT</span>',
    solid: '<span class="badge quiet">SOLID</span>',
    first: '<span class="badge quiet">FIRST</span>',
  };

  /* ================= Formatting ================= */

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function fmtW(w) { return Number.isInteger(w) ? String(w) : String(Math.round(w * 10) / 10); }

  function fmtSet(s) { return fmtW(s.weight) + ' × ' + s.reps; }

  function fmtDayLabel(key) {
    const today = dayKey(Date.now());
    const yest = dayKey(Date.now() - 86400000);
    if (key === today) return 'Today';
    if (key === yest) return 'Yesterday';
    const [y, m, d] = key.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const opts = { weekday: 'short', month: 'short', day: 'numeric' };
    if (y !== new Date().getFullYear()) opts.year = 'numeric';
    return dt.toLocaleDateString(undefined, opts);
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  }

  /* ================= Rendering ================= */

  const app = document.getElementById('app');
  let flashSetId = null;   // set id to pulse after logging
  let expandedId = null;   // which today-card logger is open

  function render() {
    const v = db.view || { name: 'today' };
    app.classList.toggle('no-tabs', v.name === 'done');
    if (v.name === 'ex' && exById(v.id)) renderDetail(exById(v.id));
    else if (v.name === 'lifts') renderLifts();
    else if (v.name === 'done' && db.sessions.find(s => s.id === v.sid)) renderDone(db.sessions.find(s => s.id === v.sid));
    else { db.view = { name: 'today' }; renderToday(); }
  }

  function go(view) { db.view = view; save(); render(); window.scrollTo(0, 0); }

  function tabbarHtml(active) {
    return `
      <nav class="tabbar"><div class="inner">
        <button id="tabToday" class="${active === 'today' ? 'on' : ''}">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <circle cx="11" cy="11" r="8.25" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="11" cy="11" r="3.5" fill="currentColor"/>
          </svg>
          Today
        </button>
        <button id="tabLifts" class="${active === 'lifts' ? 'on' : ''}">
          <svg width="24" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M1.5 12h2M20.5 12h2M7.5 12h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="4" y="6.5" width="3" height="11" rx="1.3" fill="currentColor"/>
            <rect x="17" y="6.5" width="3" height="11" rx="1.3" fill="currentColor"/>
          </svg>
          Lifts
        </button>
      </div></nav>`;
  }

  function wireTabs() {
    const t = document.getElementById('tabToday');
    const l = document.getElementById('tabLifts');
    if (t) t.addEventListener('click', () => go({ name: 'today' }));
    if (l) l.addEventListener('click', () => go({ name: 'lifts' }));
  }

  /* ================= Today (session) ================= */

  function todaySetsOf(ex) {
    const key = dayKey(Date.now());
    return ex.sets.filter(s => dayKey(s.ts) === key).sort((a, b) => a.ts - b.ts);
  }

  function renderToday() {
    const dateStr = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    const sess = todaySession();
    const exs = sess ? sess.exIds.map(exById).filter(Boolean) : [];
    const totalSets = exs.reduce((n, ex) => n + todaySetsOf(ex).length, 0);
    const savedToday = db.sessions.filter(s => s.date === dayKey(Date.now()));

    const cards = exs.map(ex => {
      const tSets = todaySetsOf(ex);
      const best = bestSet(ex);
      const lastTop = lastTopBefore(ex, dayKey(Date.now()));
      const open = ex.id === expandedId;
      const last = ex.sets.length ? ex.sets.reduce((a, b) => (b.ts > a.ts ? b : a)) : null;
      const defW = last ? last.weight : 45;
      const defR = last ? last.reps : 8;
      const subBits = [];
      if (lastTop) subBits.push('Last ' + fmtSet(lastTop));
      if (best) subBits.push('Best ' + fmtSet(best));

      return `
      <section class="card sess-card" data-ex="${ex.id}">
        <button class="sess-head" data-toggle="${ex.id}">
          <div class="t">
            <div class="nm">${esc(ex.name)}</div>
            <div class="sb">${subBits.length ? subBits.join(' · ') : 'First time — set the bar'}</div>
          </div>
          <span class="icon-btn" data-chart="${ex.id}" role="button" aria-label="History &amp; chart">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M3 14.5l4.2-5.2 3 3L16.8 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
        ${tSets.length ? `<div class="sess-sets">
          ${tSets.map(s => {
            const g = gradeSet(ex, s);
            return `<div class="set-row g-${g} ${s.id === flashSetId ? (g === 'pr' ? 'fl-pr' : g === 'beat' ? 'fl-beat' : 'fl-quiet') : ''}">
              <div class="set-num">${fmtSet(s)}</div>
              ${BADGE[g]}
              <div class="set-sp"></div>
              <div class="set-time">${fmtTime(s.ts)}</div>
              <button class="set-del" data-del="${s.id}" data-delex="${ex.id}" aria-label="Delete set">✕</button>
            </div>`;
          }).join('')}
        </div>` : ''}
        ${open ? `<div class="sess-logger">
          <div class="field">
            <div class="field-head"><span class="field-label">Weight (${esc(db.unit)})</span></div>
            <div class="stepper">
              <button class="stp" data-wm="${ex.id}">−</button>
              <input id="w-${ex.id}" type="text" inputmode="decimal" value="${fmtW(defW)}" />
              <button class="stp" data-wp="${ex.id}">+</button>
            </div>
          </div>
          <div class="field">
            <div class="field-head"><span class="field-label">Reps</span></div>
            <div class="stepper">
              <button class="stp" data-rm="${ex.id}">−</button>
              <input id="r-${ex.id}" type="text" inputmode="numeric" value="${defR}" />
              <button class="stp" data-rp="${ex.id}">+</button>
            </div>
          </div>
          <button class="btn-primary" data-log="${ex.id}">Log set</button>
          <button class="btn-quiet" data-swap="${ex.id}">Swap exercise</button>
          ${!tSets.length ? `<button class="btn-quiet" data-remove="${ex.id}">Remove from today</button>` : ''}
        </div>` : ''}
      </section>`;
    }).join('');

    app.innerHTML = `
      <header class="titlebar">
        <p class="eyebrow">${esc(dateStr)}</p>
        <h1>Today</h1>
      </header>
      <main>
        ${exs.length ? cards : `
          <div class="empty">
            <div class="empty-title">${savedToday.length ? 'Session saved' : 'No session yet'}</div>
            <div class="empty-sub">${savedToday.length
              ? savedToday.reduce((n, s) => n + s.totals.sets, 0) + ' sets banked today. Room for more.'
              : 'Add an exercise and log your first set.'}</div>
          </div>`}
        <button class="${exs.length ? 'btn-outline' : 'btn-primary'}" id="addToSession" style="margin-top:4px">Add exercise</button>
        ${totalSets > 0 ? `<button class="btn-primary" id="finish" style="margin-top:12px">Finish session</button>` : ''}
      </main>
      ${tabbarHtml('today')}`;

    wireTabs();
    document.getElementById('addToSession').addEventListener('click', openAddToSessionSheet);
    const fin = document.getElementById('finish');
    if (fin) fin.addEventListener('click', finishSession);

    app.querySelectorAll('[data-toggle]').forEach(b =>
      b.addEventListener('click', e => {
        if (e.target.closest('[data-chart]')) return;
        const id = b.dataset.toggle;
        expandedId = (expandedId === id ? null : id);
        render();
      }));

    app.querySelectorAll('[data-chart]').forEach(b =>
      b.addEventListener('click', e => {
        e.stopPropagation();
        go({ name: 'ex', id: b.dataset.chart, from: 'today' });
      }));

    app.querySelectorAll('[data-log]').forEach(b =>
      b.addEventListener('click', () => {
        const ex = exById(b.dataset.log);
        const w = Math.max(0, parseFloat(String(document.getElementById('w-' + ex.id).value).replace(',', '.')) || 0);
        const r = Math.max(0, Math.round(parseFloat(document.getElementById('r-' + ex.id).value) || 0));
        if (w <= 0 || r <= 0) return;
        const s = { id: uid(), ts: Date.now(), weight: w, reps: r };
        ex.sets.push(s);
        flashSetId = s.id;
        save();
        render();
        flashSetId = null;
      }));

    ['wm', 'wp', 'rm', 'rp'].forEach(k => {
      app.querySelectorAll('[data-' + k + ']').forEach(b =>
        b.addEventListener('click', () => {
          const id = b.dataset[k];
          const wEl = document.getElementById('w-' + id);
          const rEl = document.getElementById('r-' + id);
          const w = Math.max(0, parseFloat(String(wEl.value).replace(',', '.')) || 0);
          const r = Math.max(0, Math.round(parseFloat(rEl.value) || 0));
          if (k === 'wm') wEl.value = fmtW(Math.max(0, w - 2.5));
          if (k === 'wp') wEl.value = fmtW(w + 2.5);
          if (k === 'rm') rEl.value = Math.max(1, r - 1);
          if (k === 'rp') rEl.value = r + 1;
        }));
    });

    app.querySelectorAll('[data-del]').forEach(b =>
      b.addEventListener('click', () => {
        const ex = exById(b.dataset.delex);
        ex.sets = ex.sets.filter(s => s.id !== b.dataset.del);
        save();
        render();
      }));

    app.querySelectorAll('[data-remove]').forEach(b =>
      b.addEventListener('click', () => {
        const sess = todaySession();
        if (sess) {
          sess.exIds = sess.exIds.filter(id => id !== b.dataset.remove);
          if (!sess.exIds.length) db.today = null;
          save();
        }
        render();
      }));

    app.querySelectorAll('[data-swap]').forEach(b =>
      b.addEventListener('click', () => openSwapSheet(exById(b.dataset.swap))));
  }

  function addExerciseToSession(ex) {
    let sess = todaySession();
    if (!sess) { sess = db.today = { date: dayKey(Date.now()), exIds: [] }; }
    if (!sess.exIds.includes(ex.id)) sess.exIds.push(ex.id);
    expandedId = ex.id;
    save();
    render();
  }

  // Find a saved exercise by name; create it (preserving any existing history) if new.
  function exByName(name) { return db.exercises.find(e => e.name.toLowerCase() === String(name).toLowerCase()); }
  function ensureExercise(name) {
    name = name.trim();
    let ex = exByName(name);
    if (!ex) { ex = { id: uid(), name, sets: [] }; db.exercises.push(ex); }
    return ex;
  }

  // Searchable library sheet. opts: { title, primaryLabel, onPick(ex), excludeId }.
  function openLibrary(opts) {
    const wrap = document.createElement('div');
    wrap.innerHTML = `<div class="overlay" id="ovl"></div><div class="sheet lib" id="sheet"></div>`;
    document.body.appendChild(wrap);
    const sheet = wrap.querySelector('#sheet');
    const close = () => wrap.remove();
    wrap.querySelector('#ovl').addEventListener('click', close);

    let query = '';

    // Catalog + any custom lifts not in the catalog, minus the excluded exercise.
    function libEntries() {
      const catNames = new Set(CATALOG.map(c => c.name.toLowerCase()));
      const entries = CATALOG.map(c => ({ name: c.name, group: c.group }));
      db.exercises.forEach(e => {
        if (!catNames.has(e.name.toLowerCase())) entries.push({ name: e.name, group: 'Your lifts', custom: true });
      });
      const ex = opts.excludeId && exById(opts.excludeId);
      return ex ? entries.filter(e => e.name.toLowerCase() !== ex.name.toLowerCase()) : entries;
    }

    function rowHtml(e, showGroup) {
      return `<button class="lib-row" data-pick="${esc(e.name)}">
        <span class="nm">${esc(e.name)}${showGroup ? `<span class="grp">${esc(e.group)}</span>` : ''}</span>
        <svg class="go" width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>`;
    }

    function buildList() {
      sheet.innerHTML = `
        <div class="lib-head">
          <h2>${esc(opts.title)}</h2>
          <div class="lib-searchwrap">
            <input class="lib-search" id="libQ" type="text" placeholder="Search exercises" autocomplete="off" />
            <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.6"/><path d="M11.5 11.5l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </div>
        </div>
        <div id="libList"></div>`;
      const listEl = sheet.querySelector('#libList');
      const inp = sheet.querySelector('#libQ');
      inp.value = query;

      function updateList() {
        const entries = libEntries();
        const byName = {};
        entries.forEach(e => { byName[e.name.toLowerCase()] = e; });
        const q = query.trim().toLowerCase();
        const matched = q ? entries.filter(e => e.name.toLowerCase().includes(q) || (e.group || '').toLowerCase().includes(q)) : entries;

        let html;
        if (q) {
          html = matched.length ? matched.map(e => rowHtml(e, true)).join('')
                                : `<div class="lib-empty">No exercise matches “${esc(query.trim())}”.</div>`;
          if (!matched.some(e => e.name.toLowerCase() === q))
            html += `<button class="btn-outline lib-create" data-create="1">Create “${esc(query.trim())}”</button>`;
        } else {
          html = GROUPS.map(g => {
            const rows = matched.filter(e => e.group === g);
            return rows.length ? `<div class="sect">${g}</div>${rows.map(e => rowHtml(e, false)).join('')}` : '';
          }).join('');
          const custom = matched.filter(e => e.group === 'Your lifts');
          if (custom.length) html += `<div class="sect">Your lifts</div>${custom.map(e => rowHtml(e, false)).join('')}`;
        }
        listEl.innerHTML = html;

        listEl.querySelectorAll('[data-pick]').forEach(b =>
          b.addEventListener('click', () => openInfo(byName[b.dataset.pick.toLowerCase()])));
        const cr = listEl.querySelector('[data-create]');
        if (cr) cr.addEventListener('click', () => { const ex = ensureExercise(query.trim()); close(); opts.onPick(ex); });
      }

      inp.addEventListener('input', () => { query = inp.value; updateList(); });
      updateList();
    }

    // How-to + muscle diagram for one exercise, with the primary add/swap action.
    function openInfo(entry) {
      if (!entry) return;
      const cat = CATALOG.find(c => c.name.toLowerCase() === entry.name.toLowerCase());
      sheet.innerHTML = `
        <button class="info-back" id="infoBack">
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>

        ${cat ? `<div class="info-sub">${esc(cat.sub)}</div>` : ''}

        ${cat ? `<ol class="how">${cat.how.map(h => `<li>${esc(h)}</li>`).join('')}</ol>`
              : `<div class="info-note">A custom lift — no guide for this one, but its full history comes with it.</div>`}

      sheet.querySelector('#infoBack').addEventListener('click', buildList);
      sheet.querySelector('#infoPick').addEventListener('click', () => {
        const ex = ensureExercise(entry.name);

  // Swap one session exercise for another, keeping today's logged sets and both histories.
  function performSwap(fromEx, toEx) {
    if (!fromEx || !toEx || fromEx.id === toEx.id) return;
    const key = dayKey(Date.now());
    // Today's sets move with the swap so nothing you just logged is lost.
    const moving = fromEx.sets.filter(s => dayKey(s.ts) === key);
    fromEx.sets = fromEx.sets.filter(s => dayKey(s.ts) !== key);
    toEx.sets.push(...moving);
    toEx.sets.sort((a, b) => a.ts - b.ts);

    const sess = todaySession();
    if (sess) {
      const i = sess.exIds.indexOf(fromEx.id);
      if (i >= 0) {
        if (sess.exIds.includes(toEx.id)) sess.exIds.splice(i, 1); // target already present — drop the old slot
        else sess.exIds[i] = toEx.id;
      } else if (!sess.exIds.includes(toEx.id)) {
        sess.exIds.push(toEx.id);
      }
    }
    // Drop the old exercise only if the swap left it with no history at all.
    if (fromEx.sets.length === 0) db.exercises = db.exercises.filter(e => e.id !== fromEx.id);

    expandedId = toEx.id;
    save();
    render();
  }

  function openSwapSheet(fromEx) {
    openLibrary({
      title: 'Swap exercise',
      primaryLabel: 'Swap to this',
      excludeId: fromEx.id,
      onPick: toEx => performSwap(fromEx, toEx),
    });
  }

  /* ================= Finish & celebration ================= */

  function finishSession() {
    const sess = todaySession();
    if (!sess) return;
    const today = dayKey(Date.now());
    const items = [];
    const wins = [];
    let totalSets = 0, volume = 0;

    for (const id of sess.exIds) {
      const ex = exById(id);
      if (!ex) continue;
      const tSets = todaySetsOf(ex);
      if (!tSets.length) continue;
      totalSets += tSets.length;
      volume += tSets.reduce((v, s) => v + s.weight * s.reps, 0);
      const top = tSets.reduce((a, b) => (score(b) > score(a) ? b : a));
      items.push({
        name: ex.name,
        sets: tSets.map(s => ({ weight: s.weight, reps: s.reps, grade: gradeSet(ex, s) })),
        top: { weight: top.weight, reps: top.reps },
      });

      // Wins: judged against everything before today.
      const startOfToday = new Date(); startOfToday.setHours(0, 0, 0, 0);
      const prevBest = bestSet(ex, startOfToday.getTime());
      const lastTop = lastTopBefore(ex, today);
      if (prevBest && score(top) > score(prevBest)) {
        wins.push({ name: ex.name, type: 'pr', from: fmtSet(prevBest), to: fmtSet(top) });
      } else if (lastTop && score(top) > score(lastTop)) {
        wins.push({ name: ex.name, type: 'beat', from: fmtSet(lastTop), to: fmtSet(top) });
      }
    }

    if (!totalSets) return;
    wins.sort((a, b) => (a.type === b.type ? 0 : a.type === 'pr' ? -1 : 1));

    const record = {
      id: uid(),
      ts: Date.now(),
      date: today,
      unit: db.unit,
      totals: { sets: totalSets, volume: Math.round(volume), exercises: items.length },
      items,
      wins,
    };
    db.sessions.push(record);
    db.today = null;
    expandedId = null;
    go({ name: 'done', sid: record.id });
  }

  /* ---- Chart: top set per session, scrubbable ---- */

  function mountChart(el, sessions) {
    const pts = sessions.map(s => ({ day: s.day, set: s.top, v: score(s.top) }));
    const n = pts.length;
    const W = Math.max(el.clientWidth, 200), H = 190;
    const P = { l: 10, r: 10, t: 14, b: 14 };
    const innerW = W - P.l - P.r, innerH = H - P.t - P.b;

    let min = Math.min(...pts.map(p => p.v));
    let max = Math.max(...pts.map(p => p.v));
    if (min === max) { min -= 1; max += 1; }
    const span = max - min;
    min -= span * 0.12; max += span * 0.12;

    const x = i => (n === 1 ? W / 2 : P.l + (i * innerW) / (n - 1));
    const y = v => P.t + innerH - ((v - min) / (max - min)) * innerH;

    const path = pts.map((p, i) => (i === 0 ? 'M' : 'L') + x(i).toFixed(1) + ' ' + y(p.v).toFixed(1)).join(' ');
    const li = n - 1;

    el.innerHTML = `
      <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
        ${n > 1 ? `<path d="${path}" fill="none" stroke="var(--mint)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
        <line id="scrubLine" x1="0" x2="0" y1="${P.t - 6}" y2="${H - P.b + 6}" stroke="rgba(255,255,255,0.18)" stroke-width="1" visibility="hidden"/>
        <circle id="lastDot" cx="${x(li).toFixed(1)}" cy="${y(pts[li].v).toFixed(1)}" r="4.5" fill="var(--mint)"/>
        <circle id="scrubDot" r="6" fill="var(--mint)" stroke="#000" stroke-width="2.5" visibility="hidden"/>
      </svg>`;

    const svg = el.querySelector('svg');
    const scrubLine = el.querySelector('#scrubLine');
    const scrubDot = el.querySelector('#scrubDot');
    const roNum = document.getElementById('roNum');
    const roSub = document.getElementById('roSub');

    function show(i, scrubbing) {
      const p = pts[i];
      roNum.textContent = fmtSet(p.set) + ' ' + db.unit;
      roSub.textContent = fmtDayLabel(p.day) + ' · top set';
      if (scrubbing) {
        const px = x(i).toFixed(1), py = y(p.v).toFixed(1);
        scrubLine.setAttribute('x1', px); scrubLine.setAttribute('x2', px);
        scrubDot.setAttribute('cx', px); scrubDot.setAttribute('cy', py);
        scrubLine.setAttribute('visibility', 'visible');
        scrubDot.setAttribute('visibility', 'visible');
      } else {
        scrubLine.setAttribute('visibility', 'hidden');
        scrubDot.setAttribute('visibility', 'hidden');
      }
    }

    show(li, false); // resting state: latest session

    function idxFromEvent(e) {
      const rect = svg.getBoundingClientRect();
      const rel = (e.clientX - rect.left - P.l) / (innerW || 1);
      return Math.max(0, Math.min(n - 1, Math.round(rel * (n - 1))));
    }

    let active = false;
    el.addEventListener('pointerdown', e => {
      active = true;
      el.setPointerCapture(e.pointerId);
      show(idxFromEvent(e), true);
    });
    el.addEventListener('pointermove', e => { if (active) show(idxFromEvent(e), true); });
    const end = () => { active = false; show(li, false); };
    el.addEventListener('pointerup', end);
    el.addEventListener('pointercancel', end);
  }

  /* ================= Boot ================= */

  // Load through the bridge (async) before the first paint, then render.
  (async function boot() {
    let raw = null;
    try { raw = await Promise.resolve(STORE.load()); } catch (e) { raw = null; }
    db = normalize(raw);
    render();
  })();
  </script>
</body>
</html>
